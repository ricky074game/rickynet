name: RickyNet
options:
  bundleIdPrefix: cafe.hiring
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  RickyNet:
    type: application
    platform: iOS
    sources:
      - Sources/RickyNet
      - Resources/Assets.xcassets
    # Link the Rust static lib built in CI *before* `xcodegen generate`.
    # A `framework:` dependency accepts any file path and links it by direct
    # reference; embed:false is required (app targets default embed:true, which
    # would wrongly try to copy a .a into the bundle).
    dependencies:
      - framework: Vendor/lib/librickynetcore.a
        embed: false
    settings:
      base:
        # Bundle id + team are fixed by the KravaSign-issued profiles — the
        # Ad Hoc / Development profiles ONLY authorize this exact identity.
        PRODUCT_BUNDLE_IDENTIFIER: app.yellow2173.nadir6666
        DEVELOPMENT_TEAM: YJZ3RG72A6
        SWIFT_VERSION: "5.0"
        SWIFT_OBJC_BRIDGING_HEADER: Sources/RickyNet/RickyNet-Bridging-Header.h
        LIBRARY_SEARCH_PATHS: ["$(inherited)", "$(SRCROOT)/Vendor/lib"]
        HEADER_SEARCH_PATHS: ["$(inherited)", "$(SRCROOT)/Vendor/include"]
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Manual signing driven by CI (cert imported to a temp keychain,
        # profile installed). The generic "iPhone Distribution" identity matches
        # the KravaSign cert by type without hardcoding the account name here.
        # The unsigned fallback build passes CODE_SIGNING_ALLOWED=NO on the CLI.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "iPhone Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "00008150-0015392E3401401CW1H8GN"
    info:
      path: Sources/RickyNet/Info.plist
      properties:
        CFBundleDisplayName: RickyNet
        CFBundleShortVersionString: "1.0.0"
        # Silent-audio keep-alive: lets the tunnel survive backgrounding and
        # screen-lock so the screen no longer has to be forced on.
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Expose Documents/ (rickynet.log) in the Files app so a tester can
        # retrieve the log even without the in-app share button.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true

schemes:
  RickyNet:
    build:
      targets:
        RickyNet: all
    run:
      config: Release
    archive:
      config: Release
