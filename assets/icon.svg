<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    RickyNet app icon.
    - Full-bleed 1024x1024 square, NO transparency and NO rounded corners in the
      source: iOS applies the superellipse mask itself, and the App Store /
      asset catalog rejects a marketing icon with alpha or pre-rounded corners.
    - Concept: a "phone-to-laptop data link" — a laptop whose screen now shows
      cellular signal bars, fed by the phone in front of it. The phone is the
      cellular source; the laptop is borrowing its connection. Bright cyan is the
      "data / signal" accent over a confident electric-blue -> violet diagonal.
    - Kept flat (no blurs) so it rasterizes identically across rsvg-convert /
      ImageMagick / sips and stays crisp down to 40px.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.52" stop-color="#5B29DE"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.27" cy="0.2" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background (covers every pixel; no alpha anywhere). -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#sheen)"/>

  <!-- Soft cast shadow under the device group, faked with translucent navy so no
       blur filter is needed. -->
  <g fill="#0B1220" opacity="0.18">
    <rect x="486" y="272" width="384" height="272" rx="30"/>
    <rect x="246" y="472" width="204" height="384" rx="46"/>
  </g>

  <!-- ===== Laptop (behind the phone) ===== -->
  <g>
    <!-- screen bezel -->
    <rect x="470" y="252" width="384" height="272" rx="30" fill="#F8FAFC"/>
    <!-- screen -->
    <rect x="498" y="280" width="328" height="216" rx="16" fill="url(#screen)"/>
    <!-- cellular signal bars on the laptop screen: it now has service -->
    <g fill="url(#signal)">
      <rect x="566" y="420" width="34" height="56"  rx="10"/>
      <rect x="612" y="384" width="34" height="92"  rx="10"/>
      <rect x="658" y="344" width="34" height="132" rx="10"/>
      <rect x="704" y="300" width="34" height="176" rx="10"/>
    </g>
    <!-- base / keyboard deck -->
    <rect x="426" y="524" width="472" height="44" rx="20" fill="#F8FAFC"/>
    <rect x="612" y="532" width="100" height="10" rx="5" fill="#CBD5E1"/>
  </g>

  <!-- ===== Data-in-flight: three beads arcing from phone up to the laptop ===== -->
  <g fill="#67E8F9">
    <circle cx="452" cy="520" r="13"/>
    <circle cx="486" cy="546" r="10"/>
    <circle cx="516" cy="560" r="7"/>
  </g>

  <!-- ===== Phone (in front, the cellular source) ===== -->
  <g>
    <rect x="230" y="470" width="204" height="384" rx="46" fill="#FFFFFF"/>
    <rect x="254" y="508" width="156" height="308" rx="22" fill="url(#screen)"/>
    <!-- earpiece + camera -->
    <rect x="306" y="490" width="52" height="8" rx="4" fill="#CBD5E1"/>
    <circle cx="380" cy="494" r="5" fill="#CBD5E1"/>
    <!-- small signal bars on the phone: the origin of the link -->
    <g fill="url(#signal)">
      <rect x="292" y="742" width="20" height="30" rx="6"/>
      <rect x="322" y="726" width="20" height="46" rx="6"/>
      <rect x="352" y="706" width="20" height="66" rx="6"/>
    </g>
    <!-- home indicator -->
    <rect x="304" y="800" width="56" height="9" rx="4" fill="#CBD5E1"/>
  </g>
</svg>
