# cbindgen config for rickynet-core -> rickynetcore.h
# Run in CI:  cbindgen --config cbindgen.toml --crate rickynet-core --output ios/rickynetcore.h
language = "C"
pragma_once = true
include_guard = "RICKYNETCORE_H"
autogen_warning = "/* Generated by cbindgen from rickynet-core. Do not edit by hand. */"
tab_width = 4
style = "type"
cpp_compat = true

[export]
prefix = ""
# Only export the rn_* C ABI surface.
include = ["rn_start", "rn_stop", "rn_stats"]

[fn]
sort_by = "None"

[parse]
parse_deps = false
