[package]
name = "rickynet-core"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "RickyNet phone data plane: userspace netstack + per-flow cellular re-origination, exposed over a tiny C ABI"

[lib]
name = "rickynetcore"
# staticlib -> librickynetcore.a for linking into the iOS app.
# rlib      -> so host-side tests / tooling can depend on it.
# cdylib    -> handy for host smoke tests without an Xcode link step.
crate-type = ["staticlib", "rlib", "cdylib"]

[dependencies]
rickynet-wire = { workspace = true }
log = { workspace = true }
tokio = { version = "1", features = ["rt-multi-thread", "net", "io-util", "sync", "time", "macros"] }
ipstack = "1.0"
etherparse = { version = "0.20", default-features = false, features = ["std"] }
socket2 = { version = "0.5", features = ["all"] }
libc = "0.2"

# The C header (rickynetcore.h) is generated by the standalone `cbindgen` CLI in
# CI (config: cbindgen.toml), not from a build-dependency — this keeps the crate
# graph free of a heavy optional build-dep and matches the CI flow.
