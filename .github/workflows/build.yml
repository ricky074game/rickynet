name: build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  WINTUN_VERSION: "0.14.1"

jobs:
  # ---------------------------------------------------------------------------
  # Portable logic: build the cross-platform crates and run the unit tests
  # (wire framing codec, usbmux protocol, CLI args) on Linux.
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test portable crates
        run: |
          cargo test -p rickynet-wire
          cargo test -p rickynet-win
          cargo build -p rickynet-core

  # ---------------------------------------------------------------------------
  # iOS: build the Rust static lib for aarch64-apple-ios, generate the C header,
  # rasterize the app icon, generate the Xcode project with XcodeGen, build an
  # UNSIGNED .app, and package it as an unsigned .ipa (Payload/ + zip).
  # ---------------------------------------------------------------------------
  ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select newest installed Xcode
        # brew's XcodeGen emits the latest project format (objectVersion 77);
        # the runner's default Xcode (15.4) can't read it. Pick the newest Xcode
        # present (16.x on macos-14) so xcodebuild understands the project.
        run: |
          set -e
          latest=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Selecting $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          xcodebuild -version

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - uses: Swatinem/rust-cache@v2

      - name: Build rickynet-core staticlib (aarch64-apple-ios)
        # Disable LTO for the staticlib so it contains native objects (reliable
        # ld64 linking + readable symbols) rather than thin-LTO bitcode.
        run: cargo build -p rickynet-core --release --target aarch64-apple-ios --config profile.release.lto=false

      - name: Install cbindgen
        run: cargo install cbindgen --locked || cargo install cbindgen

      - name: Generate C header + stage the static lib
        run: |
          set -euo pipefail
          mkdir -p ios/Vendor/include ios/Vendor/lib
          cbindgen --config rickynet-core/cbindgen.toml --crate rickynet-core \
            --output ios/Vendor/include/rickynetcore.h
          cp target/aarch64-apple-ios/release/librickynetcore.a ios/Vendor/lib/librickynetcore.a
          echo "=== rickynetcore.h ==="; cat ios/Vendor/include/rickynetcore.h
          echo "=== lib ==="; ls -l ios/Vendor/lib
          # Informational symbol check (non-fatal — xcodebuild's link is the real
          # test). Apple prefixes C symbols with an underscore.
          if nm -g ios/Vendor/lib/librickynetcore.a 2>/dev/null | grep -qE '_rn_start'; then
            echo "OK: rn_* symbols present in librickynetcore.a"
          else
            echo "WARN: nm did not list rn_* (unexpected with lto=false); relying on xcodebuild link"
          fi

      - name: Install XcodeGen + rasterizers
        run: brew install xcodegen librsvg imagemagick

      - name: Rasterize app icon set
        run: bash ios/scripts/make-appicon.sh

      - name: Generate Xcode project
        run: cd ios && xcodegen generate

      # Import the KravaSign Distribution cert + Ad Hoc profile into a throwaway
      # keychain so xcodebuild can sign. If the secrets aren't set (e.g. a fork
      # PR, which can't read secrets), this no-ops and only the unsigned .ipa is
      # produced. Secrets required: IOS_DIST_CERT_P12_BASE64,
      # IOS_DIST_PROFILE_BASE64, IOS_CERT_PASSWORD.
      - name: Import signing certificate & provisioning profile
        env:
          P12_B64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          PROFILE_B64: ${{ secrets.IOS_DIST_PROFILE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${P12_B64:-}" ] || [ -z "${PROFILE_B64:-}" ]; then
            echo "::warning::iOS signing secrets not set — building UNSIGNED only."
            echo "SIGN_AVAILABLE=0" >> "$GITHUB_ENV"
            exit 0
          fi
          CERT="$RUNNER_TEMP/dist.p12"
          PROFILE="$RUNNER_TEMP/dist.mobileprovision"
          printf '%s' "$P12_B64" | base64 --decode > "$CERT"
          printf '%s' "$PROFILE_B64" | base64 --decode > "$PROFILE"

          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KPW="$(uuidgen)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          # Import key+cert; grant codesign access without an interactive prompt.
          security import "$CERT" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          # Put our keychain first in the search list so xcodebuild finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          echo "Signing identities available:"
          security find-identity -v -p codesigning "$KEYCHAIN"

          # Install the profile under its UUID (both classic + Xcode 16 locations).
          UUID="$(security cms -D -i "$PROFILE" | plutil -extract UUID raw -)"
          for dir in "$HOME/Library/MobileDevice/Provisioning Profiles" \
                     "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
            mkdir -p "$dir"
            cp "$PROFILE" "$dir/$UUID.mobileprovision"
          done
          echo "Installed provisioning profile $UUID"
          echo "SIGN_AVAILABLE=1" >> "$GITHUB_ENV"

      - name: Build unsigned RickyNet.app (fallback for non-registered devices)
        run: |
          set -euo pipefail
          xcodebuild \
            -project ios/RickyNet.xcodeproj \
            -scheme RickyNet \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ios/build \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Verify icon embedded + package unsigned .ipa
        run: |
          set -euo pipefail
          APP=$(find ios/build/Build/Products -maxdepth 3 -name 'RickyNet.app' -type d | head -1)
          [ -n "$APP" ] || (echo "ERROR: RickyNet.app not found" && exit 1)
          echo "app bundle: $APP"
          ls -la "$APP"
          # The compiled asset catalog (with the app icon) must be in the bundle.
          [ -f "$APP/Assets.car" ] || (echo "ERROR: Assets.car (app icon) missing from bundle" && exit 1)
          # Best-effort dump of the icon names actool baked in.
          xcrun --sdk iphoneos assetutil --info "$APP/Assets.car" 2>/dev/null | grep -i -m1 appicon \
            && echo "AppIcon present in Assets.car" || echo "(assetutil could not confirm, Assets.car present)"
          # Package unsigned IPA.
          rm -rf Payload RickyNet-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r RickyNet-unsigned.ipa Payload >/dev/null
          echo "=== ipa ==="; ls -l RickyNet-unsigned.ipa
          unzip -l RickyNet-unsigned.ipa | head -20

      - uses: actions/upload-artifact@v4
        with:
          name: RickyNet-unsigned-ipa
          path: RickyNet-unsigned.ipa
          if-no-files-found: error

      # Signed Ad Hoc build: archive with manual signing, then export an .ipa
      # that installs directly on the KravaSign-registered device (UDID
      # 00008150-0015392e3401401c) with no SideStore / 7-day re-sign.
      - name: Archive signed app (Ad Hoc)
        if: env.SIGN_AVAILABLE == '1'
        run: |
          set -euo pipefail
          xcodebuild \
            -project ios/RickyNet.xcodeproj \
            -scheme RickyNet \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ios/RickyNet.xcarchive \
            -derivedDataPath ios/ddata \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=YJZ3RG72A6 \
            PROVISIONING_PROFILE_SPECIFIER="00008150-0015392E3401401CW1H8GN" \
            CODE_SIGN_IDENTITY="iPhone Distribution"

      - name: Export Ad Hoc .ipa
        if: env.SIGN_AVAILABLE == '1'
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>ad-hoc</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>YJZ3RG72A6</string>
            <key>compileBitcode</key><false/>
            <key>stripSwiftSymbols</key><true/>
            <key>provisioningProfiles</key><dict>
              <key>app.yellow2173.nadir6666</key>
              <string>00008150-0015392E3401401CW1H8GN</string>
            </dict>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath ios/RickyNet.xcarchive \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath ios/export
          echo "=== export dir ==="; ls -l ios/export
          IPA="$(find ios/export -maxdepth 1 -name '*.ipa' | head -1)"
          [ -n "$IPA" ] || { echo "ERROR: no signed .ipa exported"; exit 1; }
          cp "$IPA" RickyNet-signed-adhoc.ipa
          echo "signed ipa: $(ls -l RickyNet-signed-adhoc.ipa)"

      - uses: actions/upload-artifact@v4
        if: env.SIGN_AVAILABLE == '1'
        with:
          name: RickyNet-signed-adhoc-ipa
          path: RickyNet-signed-adhoc.ipa
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows: build rickynet.exe (GUI + headless), fetch the pinned wintun.dll,
  # and upload both as a zip.
  # ---------------------------------------------------------------------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build rickynet.exe (release)
        run: cargo build -p rickynet-win --release

      - name: Download pinned Wintun
        shell: pwsh
        run: |
          $url = "https://www.wintun.net/builds/wintun-$env:WINTUN_VERSION.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile wintun.zip
          Expand-Archive -Path wintun.zip -DestinationPath wintun_extract -Force
          $dll = Get-ChildItem -Path wintun_extract -Recurse -Filter wintun.dll |
                 Where-Object { $_.FullName -match 'amd64' } | Select-Object -First 1
          if (-not $dll) { throw "amd64 wintun.dll not found in archive" }
          Copy-Item $dll.FullName -Destination target/release/wintun.dll -Force
          Write-Host "Staged wintun.dll from $($dll.FullName)"

      - name: Package rickynet.exe + wintun.dll
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/rickynet.exe dist/ -Force
          Copy-Item target/release/wintun.dll   dist/ -Force
          Get-ChildItem dist
          Compress-Archive -Path dist/* -DestinationPath RickyNet-windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: RickyNet-windows
          path: RickyNet-windows.zip
          if-no-files-found: error
